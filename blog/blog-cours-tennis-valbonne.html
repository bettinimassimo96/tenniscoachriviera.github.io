<script>
(function(){
  var burger=document.getElementById('nav-burger'),links=document.getElementById('nav-links');
  if(burger&&links){burger.addEventListener('click',function(){var o=links.classList.toggle('open');burger.classList.toggle('open',o);burger.setAttribute('aria-expanded',o);});}
  document.querySelectorAll('.nav-dropdown').forEach(function(dd){
    var btn=dd.querySelector('.nav-dropdown-btn');
    if(btn){btn.addEventListener('click',function(e){e.stopPropagation();dd.classList.toggle('open');document.querySelectorAll('.nav-dropdown').forEach(function(o){if(o!==dd)o.classList.remove('open');});});}
  });
  document.addEventListener('click',function(){document.querySelectorAll('.nav-dropdown').forEach(function(dd){dd.classList.remove('open');});});
})();
</script>
<script>
(function(){
  var burger = document.getElementById('nav-burger');
  var links = document.getElementById('nav-links');
  var dropdownBtn = document.querySelector('.nav-dropdown-btn');
  var dropdown = document.querySelector('.nav-dropdown');
  if(burger && links){
    burger.addEventListener('click', function(){
      var open = links.classList.toggle('open');
      burger.classList.toggle('open', open);
      burger.setAttribute('aria-expanded', open);
    });
  }
  if(dropdownBtn && dropdown){
    dropdownBtn.addEventListener('click', function(e){
      e.stopPropagation();
      var open = dropdown.classList.toggle('open');
      dropdownBtn.setAttribute('aria-expanded', open);
    });
    document.addEventListener('click', function(){ dropdown.classList.remove('open'); });
  }
  // Highlight active page
  var path = window.location.pathname;
  document.querySelectorAll('.nav-link, .nav-dropdown-item').forEach(function(el){
    if(el.getAttribute('href') && el.getAttribute('href').indexOf(path) > -1 && path !== '/'){
      el.classList.add('active');
    }
  });
})();
</script>
