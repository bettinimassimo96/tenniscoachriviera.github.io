/* DROPDOWN */
.nav-dropdown { position: relative; }
.nav-dropdown-btn { display: flex; align-items: center; gap: 5px; }
.nav-dropdown-menu {
  position: absolute; top: calc(100% + 8px); left: 50%;
  transform: translateX(-50%);
  background: var(--navy-mid);
  border: 1px solid rgba(184,151,58,0.2);
  min-width: 220px;
  opacity: 0; visibility: hidden; pointer-events: none;
  transform: translateX(-50%) translateY(-6px);
  transition: opacity 0.2s, transform 0.2s;
  z-index: 300;
}
.nav-dropdown:hover .nav-dropdown-menu,
.nav-dropdown.open .nav-dropdown-menu {
  opacity: 1; visibility: visible; pointer-events: auto;
  transform: translateX(-50%) translateY(0);
}
.nav-dropdown-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;
  font-size: 12px; font-weight: 300;
  color: var(--text-muted); text-decoration: none;
  border-bottom: 1px solid rgba(184,151,58,0.08);
  transition: background 0.15s, color 0.15s;

.nav-burger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
.nav-burger.open span:nth-child(2) { opacity: 0; }
.nav-burger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

<script>
(function(){

  var dropdown = document.querySelector('.nav-dropdown');
  if(burger && links){
    burger.addEventListener('click', function(){
      var open = links.classList.toggle('open');
      burger.classList.toggle('open', open);
      burger.setAttribute('aria-expanded', open);
    });
  }
  if(dropdownBtn && dropdown){
    dropdownBtn.addEventListener('click', function(e){
      e.stopPropagation();
      var open = dropdown.classList.toggle('open');
      dropdownBtn.setAttribute('aria-expanded', open);
    });
    document.addEventListener('click', function(){ dropdown.classList.remove('open'); });
  }
  // Highlight active page
  var path = window.location.pathname;
  document.querySelectorAll('.nav-link, .nav-dropdown-item').forEach(function(el){
    if(el.getAttribute('href') && el.getAttribute('href').indexOf(path) > -1 && path !== '/'){

    }
  });
})();
